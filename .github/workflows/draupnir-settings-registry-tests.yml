name: Draupnir SettingsRegistry Tests

on:
  push:
    paths:
      - '.github/workflows/draupnir-settings-registry-tests.yml'
      - 'include/draupnir/settings_registry/draupnir/**'
      - 'jobs/draupnir_settings_registry_tests.pm'
      - 'modules/SettingsRegistry.pri'
      - 'tests/modules/settings_registry/**'
  workflow_dispatch:

jobs:
  draupnir-settings-registry-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            perl \
            build-essential \
            qtbase5-dev \
            qt5-qmake \
            xvfb \
            libxcb-xinerama0

      - name: Make test runner executable
        run: chmod +x tools/test-runner.pl

      - name: Run job
        run: |
          xvfb-run -a perl tools/test-runner.pl --job draupnir_settings_registry_tests

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: draupnir-settings-registry-test-logs
          path: tests/build/draupnir_settings_registry_tests/logs
          if-no-files-found: ignore
