name: Draupnir Resources Tests

on:
  push:
    paths:
      - '.github/workflows/draupnir-resources-tests.yml'
      - 'include/draupnir/resources/draupnir/**'
      - 'jobs/draupnir_resources_tests.pm'
      - 'modules/DraupnirResources.pri'
      - 'tests/modules/resources/**'
  workflow_dispatch:

jobs:
  draupnir-proxy-helper-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            perl \
            build-essential \
            qtbase5-dev \
            qt5-qmake

      - name: Make test runner executable
        run: chmod +x tools/test-runner.pl

      - name: Run job
        run: |
          perl tools/test-runner.pl --job draupnir_proxy_helper_tests

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: draupnir-proxy-helper-test-logs
          path: tests/build/draupnir_proxy_helper_tests/logs
          if-no-files-found: ignore
