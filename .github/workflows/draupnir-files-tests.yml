name: Draupnir Files Tests

on:
  push:
    paths:
      - '.github/workflows/draupnir-files-tests.yml'
      - 'jobs/draupnir_files_tests.pm'
      - 'include/draupnir/files/draupnir/**'
      - 'modules/DraupnirFiles.pri'
      - 'src/draupnir/files/draupnir/**'
      - 'tests/modules/files/**'
  workflow_dispatch:

jobs:
  draupnir-containers-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            perl \
            build-essential \
            qtbase5-dev \
            qt5-qmake

      - name: Make test runner executable
        run: chmod +x tools/test-runner.pl

      - name: Run job
        run: |
          perl tools/test-runner.pl --job draupnir_files_tests

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: draupnir-files-test-logs
          path: tests/build/draupnir_files_tests/logs
          if-no-files-found: ignore
